{% load static %}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Changmusic{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'music/style.css' %}">
</head>

<body>

    <div class="navbar">
        <div class="brand">
            <div class="brand-main">Changmusic</div>
            <div class="brand-sub">Kuwo Music Information System</div>
        </div>

        <div class="navbar-links">
            <a href="{% url 'music:home' %}">首页</a>
            <a href="{% url 'music:song_list' %}">歌曲</a>
            <a href="{% url 'music:artist_list' %}">歌手</a>
            <a href="{% url 'music:search' %}">搜索</a>
            <a href="/admin/">后台</a>
        </div>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <div class="footer">
        Changmusic · 基于 Django 的音乐信息展示系统
    </div>

</body>
</html>
